<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaboration - PG Memory System v2.3.1</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#0f3460;--bg-sidebar:#0d1b2a;--text-primary:#e0e0e0;--text-secondary:#a0a0b0;--accent:#e94560;--accent-hover:#ff6b81;--border-color:#2a2a4a;--input-bg:#1a1a3e;--input-border:#3a3a5a;--sidebar-width:220px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;padding:0;position:fixed;left:0;top:0;z-index:10}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border-color)}
.sidebar-brand h5{margin:0;color:var(--accent);font-size:.95rem;font-weight:700}
.sidebar-brand small{color:var(--text-secondary);font-size:.7rem}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;min-height:0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-secondary);text-decoration:none;font-size:.88rem;transition:all .15s;border-left:3px solid transparent}
.sidebar-nav a:hover{color:var(--text-primary);background:rgba(233,69,96,.08)}
.sidebar-nav a.active{color:var(--accent);background:rgba(233,69,96,.12);border-left-color:var(--accent)}
.sidebar-nav a .icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border-color);flex-shrink:0}.sidebar-footer a{display:block;color:var(--text-secondary);font-size:.78rem;text-decoration:none;padding:4px 0;transition:all .15s}.sidebar-footer a:hover{color:var(--accent)}
.lang-toggle{background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-secondary);border-radius:6px;padding:4px 12px;font-size:.78rem;cursor:pointer;width:100%;transition:all .2s;margin-bottom:6px}
.lang-toggle:hover{border-color:var(--accent);color:var(--text-primary)}.logout-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:8px 12px;background:rgba(233,69,96,.12);color:var(--accent);border:1px solid rgba(233,69,96,.25);border-radius:6px;font-size:.82rem;cursor:pointer;transition:all .15s;text-decoration:none;margin-top:8px;text-align:center}
.logout-btn:hover{background:rgba(233,69,96,.25);border-color:var(--accent)}
.timer-display{font-size:.68rem;color:var(--text-secondary);text-align:center;padding:4px 0;margin-top:6px;font-family:monospace}
.timer-display.warn{color:var(--accent);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.3}}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:var(--sidebar-width)}
.top-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color)}
.top-bar h4{margin:0;font-size:1.1rem;font-weight:600;flex-shrink:0}
.content-area{flex:1;overflow-y:auto;padding:0 20px;position:relative;min-height:0}
.nav-tabs{border-bottom:1px solid var(--border-color)}
.nav-tabs .nav-link{color:var(--text-secondary);border:1px solid transparent;border-radius:8px 8px 0 0;font-size:.88rem;padding:8px 20px;transition:all .15s}
.nav-tabs .nav-link:hover{color:var(--text-primary);border-color:var(--border-color) var(--border-color) transparent}
.nav-tabs .nav-link.active{color:var(--accent);background:var(--bg-secondary);border-color:var(--border-color) var(--border-color) var(--bg-primary)}
.tab-content{padding-top:16px}
.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.88rem}
.data-table thead th{color:var(--text-secondary);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--border-color);text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:2;background:var(--bg-card);box-shadow:0 2px 4px rgba(0,0,0,.3)}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid rgba(42,42,74,.4);vertical-align:middle;color:#fff}
.data-table tbody tr:hover{background:rgba(233,69,96,.05)}
.badge-status{display:inline-block;border-radius:12px;padding:3px 12px;font-size:.75rem;font-weight:600;letter-spacing:.3px}
.badge-active{background:rgba(46,204,113,.15);color:#2ecc71}
.badge-inactive{background:rgba(160,160,176,.15);color:#a0a0b0}
.badge-decommissioned{background:rgba(231,76,60,.15);color:#e74c3c}
.truncate-id{font-family:'Courier New',monospace;font-size:.8rem;color:var(--text-secondary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.loading-overlay{position:absolute;inset:0;background:rgba(26,26,46,.85);display:flex;align-items:center;justify-content:center;z-index:5}
.spinner{width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-card{margin-bottom:12px;padding:12px 16px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border-color)}
.info-card label{display:block;font-size:.72rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-card div{font-size:.9rem;color:#fff;word-break:break-all;overflow-wrap:break-word}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0;flex-wrap:wrap}
.pagination button{background:rgba(233,69,96,.08);border:1px solid rgba(233,69,96,.2);color:#fff;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:all .15s}
.pagination button:hover{background:rgba(233,69,96,.2);border-color:rgba(233,69,96,.4)}
.pagination button.active{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);color:#e94560;font-weight:700}
.pagination button:disabled{opacity:.35;cursor:not-allowed}
[data-lang="zh"] [data-en]{display:none!important}
[data-lang="en"] [data-zh]{display:none!important}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <h5>PG Memory</h5>
    <small>v2.3.1</small>
  </div>
  <nav class="sidebar-nav">
    <a href="/knowledge"><span class="icon">&#128218;</span><span data-zh>知识</span><span data-en>Knowledge</span></a>
    <a href="/memory"><span class="icon">&#129504;</span><span data-zh>记忆</span><span data-en>Memory</span></a>
    <a href="/agents"><span class="icon">&#129302;</span><span data-zh>智能体</span><span data-en>Agents</span></a>
    <a href="/tasks"><span class="icon">&#9989;</span><span data-zh>任务</span><span data-en>Tasks</span></a>
    <a href="/workspaces"><span class="icon">&#128193;</span><span data-zh>工作区</span><span data-en>Workspaces</span></a>
    <a href="/graph"><span class="icon">&#127760;</span><span data-zh>图探索</span><span data-en>Graph Explorer</span></a>
    <a href="/specs"><span class="icon">&#128196;</span><span data-zh>规格</span><span data-en>Specs</span></a>
    <a href="/collab" class="active"><span class="icon">&#128101;</span><span data-zh>协作</span><span data-en>Collab</span></a>
  </nav>
  <div class="sidebar-footer">
    <button class="lang-toggle" onclick="toggleLang()"><span data-zh>English</span><span data-en>中文</span></button>
    <a href="/logout" class="logout-btn"><span>&#128682;</span><span data-zh>登出</span><span data-en>Logout</span></a>
    <div class="timer-display" id="autoLogoutTimer">05:00</div>
  </div>
</div>
<div class="main-content">
  <div class="top-bar">
    <h4><span data-zh>协作组</span><span data-en>Collaboration Groups</span></h4>
  </div>
  <div class="content-area">
    <ul class="nav nav-tabs" role="tablist">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#groups"><span data-zh>协作组列表</span><span data-en>Groups</span></a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#detail"><span data-zh>协作组详情</span><span data-en>Group Details</span></a></li>
    </ul>
    <div class="tab-content">
      <div class="tab-pane active" id="groups">
        <div class="table-responsive mt-3">
          <table class="data-table" id="group-table">
            <thead><tr>
              <th><span data-zh>名称</span><span data-en>Name</span></th>
              <th><span data-zh>类型</span><span data-en>Type</span></th>
              <th><span data-zh>状态</span><span data-en>Status</span></th>
              <th><span data-zh>策略</span><span data-en>Policy</span></th>
              <th><span data-zh>成员数</span><span data-en>Members</span></th>
              <th><span data-zh>协调者</span><span data-en>Coordinator</span></th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="groupPagination" class="pagination"></div>
      </div>
      <div class="tab-pane" id="detail">
        <div id="group-detail" class="mt-3"><p style="color:var(--text-secondary)"><span data-zh>选择一个协作组查看详情</span><span data-en>Select a group to view details</span></p></div>
      </div>
    </div>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
var allGroups=[],PAGE_SIZE=30,groupPage=1;
async function loadGroups(){
document.getElementById('loading').style.display='flex';
try{var r=await fetch('/api/collab');var d=await r.json();allGroups=d.groups||[];groupPage=1;renderTable(allGroups);}catch(e){console.error(e);}
document.getElementById('loading').style.display='none';
}
function renderTable(groups,page){
if(page)groupPage=page;
var totalPages=Math.ceil(groups.length/PAGE_SIZE)||1;
if(groupPage>totalPages)groupPage=totalPages;
var start=(groupPage-1)*PAGE_SIZE;
var pageItems=groups.slice(start,start+PAGE_SIZE);
var tb=document.querySelector('#group-table tbody');tb.innerHTML='';
pageItems.forEach(function(g){var tr=document.createElement('tr');tr.style.cursor='pointer';
var bc=g.status==='ACTIVE'?'badge-active':g.status==='ARCHIVED'?'badge-decommissioned':'badge-inactive';
tr.innerHTML='<td>'+(g.group_name||'')+'</td><td>'+(g.group_type||'')+'</td><td><span class="badge-status '+bc+'">'+(g.status||'')+'</span></td><td>'+(g.sharing_policy||'')+'</td><td>'+(g.member_count||0)+'</td><td>'+(g.coordinator_agent_id||'')+'</td>';
tr.onclick=function(){showDetail(g)};tb.appendChild(tr);});
renderGroupPagination(groups.length);
}
function renderGroupPagination(totalCount){var pagDiv=document.getElementById('groupPagination');if(!pagDiv)return;var totalPages=Math.ceil(totalCount/PAGE_SIZE);if(totalPages<=1){pagDiv.innerHTML='';return}var h='';h+='<button onclick="goGroupPage('+(groupPage-1)+')"'+(groupPage<=1?' disabled':'')+'>\u00ab Prev</button>';var startPage=Math.max(1,groupPage-3);var endPage=Math.min(totalPages,groupPage+3);if(startPage>1)h+='<button onclick="goGroupPage(1)">1</button>';if(startPage>2)h+='<button disabled>...</button>';for(var p=startPage;p<=endPage;p++){h+='<button onclick="goGroupPage('+p+')"'+(p===groupPage?' class="active"':'')+'>'+p+'</button>'}if(endPage<totalPages-1)h+='<button disabled>...</button>';if(endPage<totalPages)h+='<button onclick="goGroupPage('+totalPages+')">'+totalPages+'</button>';h+='<button onclick="goGroupPage('+(groupPage+1)+')"'+(groupPage>=totalPages?' disabled':'')+'>Next \u00bb</button>';pagDiv.innerHTML=h}
function goGroupPage(p){groupPage=p;var ca=document.querySelector('.content-area');if(ca)ca.scrollTop=0;renderTable(allGroups,p)}
function showDetail(g){
document.querySelectorAll('.nav-link').forEach(function(a){a.classList.remove('active')});
document.querySelector('[href="#detail"]').classList.add('active');
document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active')});
document.getElementById('detail').classList.add('active');
var members=(g.members||[]).map(function(m){var rc=m.role==='LEAD'?'badge-active':'badge-inactive';return '<tr><td>'+(m.agent_id||'')+'</td><td><span class="badge-status '+rc+'">'+(m.role||'')+'</span></td><td><span class="truncate-id" style="max-width:140px" title="'+(m.personal_workspace_id||'')+'">'+(m.personal_workspace_id||'N/A')+'</span></td><td>'+(m.status||'')+'</td></tr>'}).join('');
document.getElementById('group-detail').innerHTML=
'<div class="row g-3">'+
'<div class="col-md-6"><div class="info-card"><label>Name</label><div>'+(g.group_name||'')+'</div></div></div>'+
'<div class="col-md-3"><div class="info-card"><label>Type</label><div>'+(g.group_type||'')+'</div></div></div>'+
'<div class="col-md-3"><div class="info-card"><label>Status</label><div>'+(g.status||'')+'</div></div></div>'+
'<div class="col-md-3"><div class="info-card"><label>Policy</label><div>'+(g.sharing_policy||'')+'</div></div></div>'+
'<div class="col-md-3"><div class="info-card"><label>Workspace</label><div class="truncate-id" style="max-width:100%;font-size:.82rem" title="'+(g.workspace_id||'')+'">'+(g.workspace_id||'N/A')+'</div></div></div>'+
'<div class="col-md-6"><div class="info-card"><label>Description</label><div>'+(g.description||'N/A')+'</div></div></div></div>'+
'<h6 class="mt-3 mb-2">Members ('+((g.members||[]).length)+')</h6>'+
'<table class="data-table"><thead><tr><th>Agent</th><th>Role</th><th>Personal WS</th><th>Status</th></tr></thead><tbody>'+(members||'<tr><td colspan="4" style="color:var(--text-secondary)">No members</td></tr>')+'</tbody></table>';
}
function toggleLang(){var h=document.documentElement;var c=h.getAttribute('data-lang');var n=c==='en'?'zh':'en';h.setAttribute('data-lang',n);localStorage.setItem('lang',n)}
(function(){var sl=localStorage.getItem('lang');if(sl){document.documentElement.setAttribute('data-lang',sl);document.documentElement.lang=sl}})();
loadGroups();
var _aloSec=300,_aloInt=null;
function _aloTick(){_aloSec--;if(_aloSec<=0){window.location.href='/logout';return}
var m=Math.floor(_aloSec/60),s=_aloSec%60,el=document.getElementById('autoLogoutTimer');
if(el){el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
if(_aloSec<=60){el.classList.add('warn')}else{el.classList.remove('warn')}}
if(_aloSec<=30){document.title='['+_aloSec+'s] Session Expiring'}}
function _aloReset(){_aloSec=300;var el=document.getElementById('autoLogoutTimer');if(el)el.classList.remove('warn')}
_aloInt=setInterval(_aloTick,1000);
document.addEventListener('mousemove',_aloReset);document.addEventListener('keydown',_aloReset);document.addEventListener('click',_aloReset);
</script>
</body>
</html>
