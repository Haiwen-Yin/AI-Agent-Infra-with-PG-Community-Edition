<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspaces - PostgreSQL Memory System v2.2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="/static/vis-network.min.js"></script>
<style>
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#0f3460;--bg-sidebar:#0d1b2a;--text-primary:#e0e0e0;--text-secondary:#a0a0b0;--accent:#e94560;--accent-hover:#ff6b81;--border-color:#2a2a4a;--input-bg:#1a1a3e;--input-border:#3a3a5a;--sidebar-width:220px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;min-height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;padding:0;position:fixed;left:0;top:0;z-index:10}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border-color)}
.sidebar-brand h5{margin:0;color:var(--accent);font-size:.95rem;font-weight:700}
.sidebar-brand small{color:var(--text-secondary);font-size:.7rem}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;min-height:0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-secondary);text-decoration:none;font-size:.88rem;transition:all .15s;border-left:3px solid transparent}
.sidebar-nav a:hover{color:var(--text-primary);background:rgba(233,69,96,.08)}
.sidebar-nav a.active{color:var(--accent);background:rgba(233,69,96,.12);border-left-color:var(--accent)}
.sidebar-nav a .icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border-color);flex-shrink:0}.sidebar-footer a{display:block;color:var(--text-secondary);font-size:.78rem;text-decoration:none;padding:4px 0;transition:all .15s}.sidebar-footer a:hover{color:var(--accent)}
.lang-toggle{background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-secondary);border-radius:6px;padding:4px 12px;font-size:.78rem;cursor:pointer;width:100%;transition:all .2s;margin-bottom:6px}
.lang-toggle:hover{border-color:var(--accent);color:var(--text-primary)}.logout-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:8px 12px;background:rgba(233,69,96,.12);color:var(--accent);border:1px solid rgba(233,69,96,.25);border-radius:6px;font-size:.82rem;cursor:pointer;transition:all .15s;text-decoration:none;margin-top:8px;text-align:center}
.logout-btn:hover{background:rgba(233,69,96,.25);border-color:var(--accent)}
.timer-display{font-size:.68rem;color:var(--text-secondary);text-align:center;padding:4px 0;margin-top:6px;font-family:monospace}
.timer-display.warn{color:var(--accent);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.3}}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:var(--sidebar-width)}
.top-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color)}
.top-bar h4{margin:0;font-size:1.1rem;font-weight:600;flex-shrink:0}
.content-area{flex:1;overflow-y:auto;padding:20px;position:relative}
.data-table{width:100%;border-collapse:collapse;font-size:.88rem}
.data-table thead th{color:var(--text-secondary);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--border-color);text-align:left;font-weight:600;white-space:nowrap}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid rgba(42,42,74,.4);vertical-align:middle}
.data-table tbody tr:hover{background:rgba(233,69,96,.05)}
.data-table tbody tr.ws-row{cursor:pointer}
.badge-status{display:inline-block;border-radius:12px;padding:3px 12px;font-size:.75rem;font-weight:600;letter-spacing:.3px}
.badge-active{background:rgba(46,204,113,.15);color:#2ecc71}
.badge-paused{background:rgba(241,196,15,.15);color:#f1c40f}
.badge-archived{background:rgba(160,160,176,.15);color:#a0a0b0}
.truncate-id{font-family:'Courier New',monospace;font-size:.8rem;color:var(--text-secondary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.detail-row td{padding:0!important;border-bottom:1px solid var(--border-color)}
.detail-content{padding:16px 20px;background:var(--bg-secondary);border-left:3px solid var(--accent)}
.detail-content h6{color:var(--accent);font-size:.9rem;margin:12px 0 8px;font-weight:600}
.detail-content h6:first-child{margin-top:0}
.detail-content p{margin:4px 0;font-size:.85rem;color:var(--text-primary)}
.detail-content p strong{color:var(--text-secondary);font-size:.78rem;text-transform:uppercase;letter-spacing:.3px}
.context-timeline{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.context-entry{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:6px;padding:10px 12px}
.context-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;font-size:.78rem}
.context-meta .context-id{font-family:'Courier New',monospace;color:var(--text-secondary)}
.context-meta .context-agent{color:var(--accent)}
.context-meta .context-time{color:var(--text-secondary);margin-left:auto}
.context-preview{font-size:.82rem;color:var(--text-primary);line-height:1.4}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.loading-overlay{position:absolute;inset:0;background:rgba(26,26,46,.85);display:flex;align-items:center;justify-content:center;z-index:5}
.spinner{width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
[data-lang="zh"] [data-en]{display:none!important}
[data-lang="en"] [data-zh]{display:none!important}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <h5>PG Memory</h5>
    <small>v2.2.0</small>
  </div>
  <nav class="sidebar-nav">
    <a href="/knowledge"><span class="icon">&#128218;</span><span data-zh>知识</span><span data-en>Knowledge</span></a>
    <a href="/memory"><span class="icon">&#129504;</span><span data-zh>记忆</span><span data-en>Memory</span></a>
    <a href="/agents"><span class="icon">&#129302;</span><span data-zh>智能体</span><span data-en>Agents</span></a>
    <a href="/tasks"><span class="icon">&#9989;</span><span data-zh>任务</span><span data-en>Tasks</span></a>
    <a href="/workspaces" class="active"><span class="icon">&#128193;</span><span data-zh>工作区</span><span data-en>Workspaces</span></a>
    <a href="/graph"><span class="icon">&#127760;</span><span data-zh>图探索</span><span data-en>Graph Explorer</span></a>
  </nav>
  <div class="sidebar-footer">
    <button class="lang-toggle" onclick="toggleLang()"><span data-zh>English</span><span data-en>中文</span></button>
    <a href="/logout" class="logout-btn"><span>&#128682;</span><span data-zh>登出</span><span data-en>Logout</span></a>
    <div class="timer-display" id="autoLogoutTimer">05:00</div>
  </div>
</div>

<div class="main-content">
  <div class="top-bar">
    <h4><span data-zh>工作区管理</span><span data-en>Workspace Management</span></h4>
  </div>
  <div class="content-area">
    <div id="emptyState" class="empty-state d-none">
      <div class="icon">&#128193;</div>
      <div><span data-zh>暂无工作区</span><span data-en>No workspaces found</span></div>
    </div>
    <div class="table-responsive">
      <table class="data-table" id="workspaceTable">
        <thead>
          <tr>
            <th><span data-zh>工作区ID</span><span data-en>Workspace ID</span></th>
            <th><span data-zh>名称</span><span data-en>Name</span></th>
            <th><span data-zh>类型</span><span data-en>Type</span></th>
            <th><span data-zh>状态</span><span data-en>Status</span></th>
            <th><span data-zh>隔离模式</span><span data-en>Isolation</span></th>
            <th><span data-zh>当前智能体</span><span data-en>Current Agent</span></th>
          </tr>
        </thead>
        <tbody id="workspaceBody"></tbody>
      </table>
    </div>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  </div>
</div>

<script>
var workspacesData = [];

function toggleLang() {
  var h = document.documentElement;
  var c = h.getAttribute('data-lang');
  h.setAttribute('data-lang', c === 'en' ? 'zh' : 'en');
}

function escapeHtml(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function truncId(id) {
  if (!id) return '-';
  var s = String(id);
  return s.length > 12 ? '<span title="' + escapeHtml(s) + '" class="truncate-id">' + escapeHtml(s.substring(0, 12)) + '&hellip;</span>' : escapeHtml(s);
}

function statusBadge(status) {
  var m = { ACTIVE: 'badge-active', PAUSED: 'badge-paused', ARCHIVED: 'badge-archived' };
  var cls = m[status] || 'badge-archived';
  return '<span class="badge-status ' + cls + '">' + escapeHtml(status || 'UNKNOWN') + '</span>';
}

function renderWorkspaces(data) {
  workspacesData = data.workspaces || [];
  var tbody = document.getElementById('workspaceBody');
  var empty = document.getElementById('emptyState');
  if (!workspacesData.length) {
    tbody.innerHTML = '';
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');
  var h = '';
  for (var i = 0; i < workspacesData.length; i++) {
    var ws = workspacesData[i];
    h += '<tr class="ws-row" data-idx="' + i + '">';
    h += '<td>' + truncId(ws.workspace_id) + '</td>';
    h += '<td>' + escapeHtml(ws.workspace_name || '-') + '</td>';
    h += '<td>' + escapeHtml(ws.workspace_type || '-') + '</td>';
    h += '<td>' + statusBadge(ws.status) + '</td>';
    h += '<td>' + escapeHtml(ws.isolation_mode || '-') + '</td>';
    h += '<td>' + truncId(ws.current_agent_id) + '</td>';
    h += '</tr>';
    h += '<tr class="detail-row" id="detail-' + i + '" style="display:none"><td colspan="6"><div class="detail-content" id="detail-content-' + i + '"></div></td></tr>';
  }
  tbody.innerHTML = h;
  var rows = tbody.querySelectorAll('.ws-row');
  for (var j = 0; j < rows.length; j++) {
    rows[j].addEventListener('click', (function(idx) {
      return function() { expandDetail(idx); };
    })(parseInt(rows[j].getAttribute('data-idx'))));
  }
}

function expandDetail(idx) {
  var allDetails = document.querySelectorAll('.detail-row');
  for (var i = 0; i < allDetails.length; i++) {
    allDetails[i].style.display = 'none';
  }
  var detailRow = document.getElementById('detail-' + idx);
  if (detailRow.style.display === 'table-row') {
    detailRow.style.display = 'none';
    return;
  }
  var ws = workspacesData[idx];
  var content = document.getElementById('detail-content-' + idx);
  var html = '';
  html += '<p><strong><span data-zh>摘要</span><span data-en>Summary</span></strong>: ' + escapeHtml(ws.summary || '-') + '</p>';
  html += '<p><strong><span data-zh>上下文数</span><span data-en>Context Count</span></strong>: ' + (ws.context_count || 0) + ' &nbsp; <strong><span data-zh>任务数</span><span data-en>Task Count</span></strong>: ' + (ws.task_count || 0) + '</p>';
  html += '<h6><span data-zh>上下文链</span><span data-en>Context Chain</span></h6>';
  if (ws.context_chain && ws.context_chain.length > 0) {
    html += '<div class="context-timeline">';
    for (var i = 0; i < ws.context_chain.length; i++) {
      var ctx = ws.context_chain[i];
      var preview = ctx.context_data ? (typeof ctx.context_data === 'string' ? ctx.context_data.substring(0, 120) : JSON.stringify(ctx.context_data).substring(0, 120)) : '-';
      html += '<div class="context-entry">';
      html += '<div class="context-meta">';
      html += '<span class="context-id">' + escapeHtml(ctx.context_id || '') + '</span>';
      html += '<span class="badge-status badge-active">' + escapeHtml(ctx.context_type || '') + '</span>';
      html += '<span class="context-agent">' + escapeHtml(ctx.agent_id || '') + '</span>';
      html += '<span class="context-time">' + escapeHtml(ctx.created_at || '') + '</span>';
      html += '</div>';
      html += '<div class="context-preview">' + escapeHtml(preview) + (preview.length >= 120 ? '...' : '') + '</div>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<p style="color:var(--text-secondary);font-size:.85rem"><span data-zh>暂无上下文</span><span data-en>No context entries</span></p>';
  }
  html += '<h6><span data-zh>关联任务</span><span data-en>Linked Tasks</span></h6>';
  if (ws.linked_tasks && ws.linked_tasks.length > 0) {
    html += '<table class="data-table"><thead><tr>';
    html += '<th><span data-zh>计划ID</span><span data-en>Plan ID</span></th>';
    html += '<th><span data-zh>目标</span><span data-en>Goal</span></th>';
    html += '<th><span data-zh>状态</span><span data-en>Status</span></th>';
    html += '</tr></thead><tbody>';
    for (var j = 0; j < ws.linked_tasks.length; j++) {
      var t = ws.linked_tasks[j];
      html += '<tr><td>' + truncId(t.plan_id) + '</td><td>' + escapeHtml(t.goal || '-') + '</td><td>' + statusBadge(t.status) + '</td></tr>';
    }
    html += '</tbody></table>';
  } else {
    html += '<p style="color:var(--text-secondary);font-size:.85rem"><span data-zh>暂无任务</span><span data-en>No linked tasks</span></p>';
  }
  content.innerHTML = html;
  detailRow.style.display = 'table-row';
}

async function loadData() {
  try {
    var res = await fetch('/api/workspaces');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    renderWorkspaces(data);
    document.getElementById('loadingOverlay').style.display = 'none';
  } catch (err) {
    document.getElementById('loadingOverlay').innerHTML = '<div style="text-align:center;color:var(--accent)"><div style="font-size:2rem;margin-bottom:12px">&#9888;</div><div>' + escapeHtml(err.message) + '</div></div>';
  }
}

loadData();

var _aloSec=300,_aloInt=null;
function _aloTick(){_aloSec--;if(_aloSec<=0){window.location.href='/logout';return}
var m=Math.floor(_aloSec/60),s=_aloSec%60,el=document.getElementById('autoLogoutTimer');
if(el){el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
if(_aloSec<=60){el.classList.add('warn')}else{el.classList.remove('warn')}}
if(_aloSec<=30){document.title='['+_aloSec+'s] Session Expiring'}}
function _aloReset(){_aloSec=300;var el=document.getElementById('autoLogoutTimer');if(el)el.classList.remove('warn')}
_aloInt=setInterval(_aloTick,1000);
document.addEventListener('mousemove',_aloReset);document.addEventListener('keydown',_aloReset);document.addEventListener('click',_aloReset);
</script>
</body>
</html>
